name: quality

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  package-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Check whitespace
        run: git diff --check

      - name: Check for local path leaks
        run: |
          if rg "/Users/|/private|Documents/Codex|dmae97" . \
            -g '!docs/GITHUB_RELEASE.md' \
            -g '!docs/CODE_QUALITY.md' \
            -g '!docs/CODE_REVIEW.md' \
            -g '!.github/workflows/quality.yml'; then
            echo "Local path leak detected"
            exit 1
          fi

      - name: Parse skill metadata
        run: |
          ruby -e 'require "yaml"; YAML.load_file("skills/kimi-agent-swarm-prompt/agents/openai.yaml")'
          ruby -e 'require "yaml"; front=File.read("skills/kimi-agent-swarm-prompt/SKILL.md")[/\A---\n(.*?)\n---/m,1]; YAML.load(front)'

      - name: Check shell scripts
        run: |
          bash -n scripts/install-codex-skill.sh
          bash -n scripts/install-kimi-code-skill.sh
          bash -n scripts/sync-prompt-engineering-upstream.sh

      - name: Parse Kimi Code CLI skill metadata
        run: |
          ruby -e 'require "yaml"; front=File.read("skills/kimi-agent-swarm-cli/SKILL.md")[/\A---\n(.*?)\n---/m,1]; YAML.load(front)'

      - name: Smoke install Codex skill
        run: |
          tmpdir="$(mktemp -d)"
          CODEX_HOME="$tmpdir" scripts/install-codex-skill.sh
          test -f "$tmpdir/skills/kimi-agent-swarm-prompt/SKILL.md"
          test -f "$tmpdir/skills/kimi-agent-swarm-prompt/references/wide-search-mode.md"
          test -f "$tmpdir/skills/kimi-agent-swarm-prompt/vendor/prompt-engineering-skills/LICENSE"

      - name: Smoke install Kimi Code CLI skill
        run: |
          tmpdir="$(mktemp -d)"
          KIMI_CODE_HOME="$tmpdir" scripts/install-kimi-code-skill.sh
          test -f "$tmpdir/skills/kimi-agent-swarm-cli/SKILL.md"
          test -f "$tmpdir/skills/kimi-agent-swarm-cli/references/agent-swarm-tool.md"
          test -f "$tmpdir/skills/kimi-agent-swarm-cli/references/wide-search-mode.md"

      - name: Install runtime dependencies
        working-directory: runtime/wide-search
        run: bun install

      - name: Type-check runtime
        working-directory: runtime/wide-search
        run: bun run typecheck

      - name: Run wide-search runtime tests
        working-directory: runtime/wide-search
        run: bun test

      - name: Smoke wide-search runtime CLI
        working-directory: runtime/wide-search
        run: |
          tmpdir="$(mktemp -d)"
          bun run src/cli.ts run \
            --profile local-command \
            --provider-command bun \
            --provider-args fixtures/jsonl-provider.ts \
            --objective "Evaluate command-backed source ingestion" \
            --work-dir "$tmpdir"
