name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run typecheck

      - name: Lint
        run: bun run check

      - name: Run tests
        env:
          REDIS_URL: redis://localhost:6379
        run: bun test

      - name: Pack and verify installed bin
        run: |
          bun run pack
          tarball=$(ls kimi-agent-swarm-cli-*.tgz | head -n 1)
          temp_dir=$(mktemp -d)
          cd "$temp_dir"
          npm install "$tarball"
          ./node_modules/.bin/kasw --help
          ./node_modules/.bin/kasw providers

      - name: Pack and verify installed bin
        run: |
          npm pack
          mkdir /tmp/kasw-pkg-test
          cd /tmp/kasw-pkg-test
          npm init -y
          npm install "$(ls ${{ github.workspace }}/kimi-agent-swarm-cli-*.tgz)"
          npx kasw --help
